<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directorio de Locales</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0eb;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #7a7067;
      --accent: #c8773a;
      --border: #e2d9d0;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }
    header { text-align: center; margin-bottom: 3rem; }
    header .label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 0.5rem;
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.1;
    }
    header p { margin-top: 0.75rem; color: var(--muted); font-size: 0.95rem; font-weight: 300; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.13); }
    .card-photo {
      width: 100%;
      aspect-ratio: 4/3;
      background: #e8e0d8;
      position: relative;
      overflow: hidden;
    }
    .card-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .card:hover .card-photo img { transform: scale(1.04); }
    .card-photo .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
    }
    .card-body { padding: 1.25rem 1.4rem 1.4rem; }
    .card-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 0.95rem;
      grid-column: 1/-1;
    }
    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <header>
    <div class="label">CC Bahía Sur · San Fernando</div>
    <h1>Directorio de Locales</h1>
    <p>Encuentra tu tienda favorita</p>
  </header>

  <div class="grid" id="grid">
    <div class="loading">Cargando locales...</div>
  </div>

  <footer>CC Bahía Sur · Cushman & Wakefield</footer>

  <script>
    const SUPABASE_URL = 'https://fmdzzpvwcocgycabdtsm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_wXkbrZr3OhMEF35axgxI3Q_Q9h4BMyf';

    async function cargarLocales() {
      const grid = document.getElementById('grid');
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/locales?select=*&order=nombre.asc`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        const locales = await res.json();

        if (!locales.length) {
          grid.innerHTML = '<div class="loading">No hay locales todavía. Añade algunos desde el panel de administración.</div>';
          return;
        }

        grid.innerHTML = locales.map(local => `
          <div class="card">
            <div class="card-photo">
              ${local.foto_url
                ? `<img src="${local.foto_url}" alt="${local.nombre}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
                : ''}
              <div class="placeholder" style="display:${local.foto_url ? 'none' : 'flex'}">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
                Sin foto
              </div>
            </div>
            <div class="card-body">
              <h2>${local.nombre}</h2>
            </div>
          </div>
        `).join('');

      } catch (err) {
        grid.innerHTML = '<div class="loading">Error al cargar los locales.</div>';
      }
    }

    cargarLocales();
  </script>

</body>
</html>

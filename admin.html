<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Directorio de Locales</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f0eb;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #7a7067;
      --accent: #c8773a;
      --accent2: #a85e28;
      --border: #e2d9d0;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --red: #e05252;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }
    header {
      text-align: center;
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 600;
    }
    header p { color: var(--muted); font-size: 0.85rem; margin-top: 0.3rem; }

    /* FORMULARIO AÑADIR */
    .form-card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.5rem;
      max-width: 500px;
      margin: 0 auto 2rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .form-card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: var(--accent); }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 0.4rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }

    /* Preview foto */
    .foto-preview {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--bg);
      border-radius: 10px;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .foto-preview:hover { border-color: var(--accent); }
    .foto-preview img { width: 100%; height: 100%; object-fit: cover; }
    .foto-preview .placeholder-text { color: var(--muted); font-size: 0.85rem; text-align: center; padding: 1rem; }
    input[type="file"] { display: none; }

    .btn {
      width: 100%;
      padding: 0.875rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:disabled { background: #d4b89a; cursor: not-allowed; }

    .msg {
      text-align: center;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 0.75rem;
      display: none;
    }
    .msg.ok { background: #e6f4ea; color: #2d6a4f; display: block; }
    .msg.err { background: #fdecea; color: #c0392b; display: block; }

    /* LISTA DE LOCALES */
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      max-width: 500px;
      margin: 0 auto 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
    }

    .local-item {
      background: var(--card);
      border-radius: 12px;
      padding: 1rem;
      max-width: 500px;
      margin: 0 auto 0.75rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .local-item img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .local-item .no-foto {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--muted);
      font-size: 0.65rem;
      text-align: center;
    }
    .local-info { flex: 1; min-width: 0; }
    .local-info strong { font-size: 0.95rem; display: block; }
    .local-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
    .btn-sm {
      padding: 0.4rem 0.75rem;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-sm:hover { opacity: 0.8; }
    .btn-edit { background: #e8f0fe; color: #1a56db; }
    .btn-delete { background: #fdecea; color: var(--red); }

    .loading { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }
  </style>
</head>
<body>

  <header>
    <h1>Panel de Administración</h1>
    <p>Directorio de Locales · CC Bahía Sur</p>
  </header>

  <!-- FORMULARIO -->
  <div class="form-card">
    <h2 id="form-title">➕ Añadir local</h2>

    <div class="form-group">
      <label>Nombre del local</label>
      <input type="text" id="input-nombre" placeholder="Ej: Zara">
    </div>

    <div class="form-group">
      <label>Foto</label>
      <div class="foto-preview" id="foto-preview" onclick="document.getElementById('input-foto').click()">
        <div class="placeholder-text">Toca para seleccionar foto<br>desde cámara o galería</div>
      </div>
      <input type="file" id="input-foto" accept="image/*" onchange="previsualizarFoto(event)">
      <div class="form-group" style="margin-bottom:0">
        <label>O pega una URL de foto</label>
        <input type="text" id="input-url" placeholder="https://...">
      </div>
    </div>

    <input type="hidden" id="edit-id">
    <button class="btn btn-primary" id="btn-guardar" onclick="guardarLocal()">Guardar local</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- LISTA -->
  <div class="section-title" style="max-width:500px;margin:0 auto 1rem">Locales guardados</div>
  <div id="lista"><div class="loading">Cargando...</div></div>

  <script>
    const SUPABASE_URL = 'https://fmdzzpvwcocgycabdtsm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_wXkbrZr3OhMEF35axgxI3Q_Q9h4BMyf';
    const HEADERS = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json'
    };

    let fotoBase64 = null;

    function previsualizarFoto(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        fotoBase64 = ev.target.result;
        const preview = document.getElementById('foto-preview');
        preview.innerHTML = `<img src="${fotoBase64}">`;
      };
      reader.readAsDataURL(file);
    }

    async function subirFotoCloudinary(base64) {
      // Si tienes Cloudinary puedes configurarlo aquí
      // Por ahora devuelve la base64 directamente (funciona pero no es ideal para producción)
      return base64;
    }

    function mostrarMensaje(texto, tipo) {
      const msg = document.getElementById('msg');
      msg.textContent = texto;
      msg.className = `msg ${tipo}`;
      setTimeout(() => { msg.className = 'msg'; }, 3000);
    }

    async function guardarLocal() {
      const nombre = document.getElementById('input-nombre').value.trim();
      const urlManual = document.getElementById('input-url').value.trim();
      const editId = document.getElementById('edit-id').value;
      const btn = document.getElementById('btn-guardar');

      if (!nombre) { mostrarMensaje('El nombre es obligatorio', 'err'); return; }

      btn.disabled = true;
      btn.textContent = 'Guardando...';

      let foto_url = urlManual || fotoBase64 || null;

      const datos = { nombre, foto_url };

      try {
        let res;
        if (editId) {
          res = await fetch(`${SUPABASE_URL}/rest/v1/locales?id=eq.${editId}`, {
            method: 'PATCH',
            headers: { ...HEADERS, 'Prefer': 'return=representation' },
            body: JSON.stringify(datos)
          });
        } else {
          res = await fetch(`${SUPABASE_URL}/rest/v1/locales`, {
            method: 'POST',
            headers: { ...HEADERS, 'Prefer': 'return=representation' },
            body: JSON.stringify(datos)
          });
        }

        if (res.ok) {
          mostrarMensaje(editId ? 'Local actualizado ✓' : 'Local añadido ✓', 'ok');
          resetFormulario();
          cargarLocales();
        } else {
          const err = await res.json();
          mostrarMensaje('Error: ' + (err.message || 'algo falló'), 'err');
        }
      } catch (e) {
        mostrarMensaje('Error de conexión', 'err');
      }

      btn.disabled = false;
      btn.textContent = 'Guardar local';
    }

    function resetFormulario() {
      document.getElementById('input-nombre').value = '';
      document.getElementById('input-url').value = '';
      document.getElementById('edit-id').value = '';
      document.getElementById('foto-preview').innerHTML = '<div class="placeholder-text">Toca para seleccionar foto<br>desde cámara o galería</div>';
      document.getElementById('form-title').textContent = '➕ Añadir local';
      fotoBase64 = null;
    }

    function editarLocal(local) {
      document.getElementById('input-nombre').value = local.nombre;
      document.getElementById('input-url').value = local.foto_url || '';
      document.getElementById('edit-id').value = local.id;
      document.getElementById('form-title').textContent = '✏️ Editar local';
      if (local.foto_url) {
        document.getElementById('foto-preview').innerHTML = `<img src="${local.foto_url}">`;
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function eliminarLocal(id) {
      if (!confirm('¿Eliminar este local?')) return;
      await fetch(`${SUPABASE_URL}/rest/v1/locales?id=eq.${id}`, {
        method: 'DELETE',
        headers: HEADERS
      });
      cargarLocales();
    }

    async function cargarLocales() {
      const lista = document.getElementById('lista');
      const res = await fetch(`${SUPABASE_URL}/rest/v1/locales?select=*&order=nombre.asc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      const locales = await res.json();

      if (!locales.length) {
        lista.innerHTML = '<div class="loading">No hay locales todavía.</div>';
        return;
      }

      lista.innerHTML = locales.map(l => `
        <div class="local-item">
          ${l.foto_url
            ? `<img src="${l.foto_url}" onerror="this.outerHTML='<div class=no-foto>Sin foto</div>'">`
            : '<div class="no-foto">Sin foto</div>'}
          <div class="local-info">
            <strong>${l.nombre}</strong>
          </div>
          <div class="local-actions">
            <button class="btn-sm btn-edit" onclick='editarLocal(${JSON.stringify(l)})'>Editar</button>
            <button class="btn-sm btn-delete" onclick="eliminarLocal(${l.id})">Borrar</button>
          </div>
        </div>
      `).join('');
    }

    cargarLocales();
  </script>

</body>
</html>
